[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotcode-repl"
description = 'RobotCode REPL for Robot Framework'
readme = { "file" = "README.md", "content-type" = "text/markdown" }
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
keywords = []
authors = [{ name = "Daniel Biehl", email = "dbiehl@live.de" }]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
  "Operating System :: OS Independent",
  "Topic :: Utilities",
  "Typing :: Typed",
  "Framework :: Robot Framework",
  "Framework :: Robot Framework :: Tool",
]
dynamic = ["version"]
dependencies = [
  "robotcode-runner"
]

[project.optional-dependencies]
# `gnureadline` ships a real GNU libreadline with the Python bindings —
# install it when your interpreter's stdlib `readline` is backed by
# libedit (macOS system Python, some Linux Pythons built via
# python-build-standalone / uv). libedit silently ignores the
# GNU-specific completion bindings the REPL relies on
# (`set completion-query-items`, `tab: complete`, …), so without
# `gnureadline` Tab-completion falls back to the verbose default
# layout with the "Display all NNN possibilities?" prompt.
gnureadline = ["gnureadline; sys_platform != 'win32'"]

[project.entry-points.robotcode]
repl = "robotcode.repl.hooks"

[project.urls]
Homepage = "https://robotcode.io"
Donate = "https://opencollective.com/robotcode"
Documentation = "https://github.com/robotcodedev/robotcode#readme"
Changelog = "https://github.com/robotcodedev/robotcode/blob/main/CHANGELOG.md"
Issues = "https://github.com/robotcodedev/robotcode/issues"
Source = "https://github.com/robotcodedev/robotcode"

[tool.hatch.version]
path = "src/robotcode/repl/__version__.py"

[tool.hatch.build]
dev-mode-dirs = ["src"]

[tool.hatch.build.targets.wheel]
only-include = ["src/robotcode"]
sources = ["src"]

[tool.hatch.build.targets.sdist]
only-include = ["src"]

[tool.hatch.envs.build]
detached = true
python = "310"
