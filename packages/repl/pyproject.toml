[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robotcode-repl"
description = 'RobotCode REPL for Robot Framework'
readme = { "file" = "README.md", "content-type" = "text/markdown" }
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
keywords = []
authors = [{ name = "Daniel Biehl", email = "dbiehl@live.de" }]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
  "Operating System :: OS Independent",
  "Topic :: Utilities",
  "Typing :: Typed",
  "Framework :: Robot Framework",
  "Framework :: Robot Framework :: Tool",
]
dynamic = ["version"]
dependencies = [
  "robotcode-runner"
]

[project.optional-dependencies]
# `prompt_toolkit` lights up the rich prompt — candidate popup,
# Ctrl-R reverse search, fish-style auto-suggest, multi-line cursor
# movement, syntax highlighting, signature toolbar, persistent
# history. Without it the REPL degrades to a bare `input()` prompt
# (no editor, no completion, no history).
prompt-toolkit = ["prompt_toolkit>=3.0"]

[project.entry-points.robotcode]
repl = "robotcode.repl.hooks"

[project.urls]
Homepage = "https://robotcode.io"
Donate = "https://opencollective.com/robotcode"
Documentation = "https://github.com/robotcodedev/robotcode#readme"
Changelog = "https://github.com/robotcodedev/robotcode/blob/main/CHANGELOG.md"
Issues = "https://github.com/robotcodedev/robotcode/issues"
Source = "https://github.com/robotcodedev/robotcode"

[tool.hatch.version]
path = "src/robotcode/repl/__version__.py"

[tool.hatch.build]
dev-mode-dirs = ["src"]

[tool.hatch.build.targets.wheel]
only-include = ["src/robotcode"]
sources = ["src"]

[tool.hatch.build.targets.sdist]
only-include = ["src"]

[tool.hatch.envs.build]
detached = true
python = "310"
